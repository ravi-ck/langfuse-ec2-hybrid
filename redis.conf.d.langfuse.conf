# Drop-in for Redis 7 — merge into /etc/redis/redis.conf
#
# Listen on the docker bridge + loopback only (never expose publicly).
bind 172.17.0.1 127.0.0.1
port 6379
protected-mode yes

# Langfuse uses Redis as a BullMQ job queue. Eviction would DROP queued jobs,
# so noeviction is REQUIRED, not optional.
maxmemory 1500mb
maxmemory-policy noeviction

requirepass <REDIS_PASSWORD>

# Light persistence so a reboot doesn't lose in-flight queue state.
appendonly yes
appendfsync everysec

# After editing:  sudo systemctl restart redis-server
