# Drop-in for PostgreSQL 17 — install to:
#   /etc/postgresql/17/main/conf.d/langfuse.conf   (Debian/Ubuntu)
#   or append to postgresql.conf on other distros
#
# Listen on the docker bridge so containers can connect, plus loopback.
listen_addresses = '172.17.0.1,127.0.0.1'
port = 5432

# Modest tuning for a co-located 16 GB host. Scale up on larger instances.
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 32MB
max_connections = 100

# --- Also add to pg_hba.conf (allow the docker bridge subnet) ---
# host  all  postgres  172.17.0.0/16  scram-sha-256
#
# Then:  sudo -u postgres psql -c "ALTER USER postgres PASSWORD '<PG_PASSWORD>';"
#        sudo systemctl restart postgresql
