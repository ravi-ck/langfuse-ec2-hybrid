# nginx reverse proxy for langfuse-web — TLS termination on the host.
#
# The compose file binds langfuse-web to 127.0.0.1:3000 (loopback only), so the
# ONLY public entry point is this nginx server on 443. Keep the EC2 security
# group open on 443 (and 80 for the redirect) and CLOSED on
# 3000 / 5432 / 6379 / 8123 / 9000.
#
# Install:
#   sudo cp nginx.langfuse.conf /etc/nginx/conf.d/langfuse.conf
#   # edit server_name below to your domain, then:
#   sudo certbot --nginx -d langfuse.yourdomain.com     # fills in the ssl_certificate lines
#   sudo nginx -t && sudo systemctl reload nginx
#
# After TLS is live, set NEXTAUTH_URL=https://langfuse.yourdomain.com in .env
# and `docker compose up -d` so auth callbacks use the public HTTPS URL.

upstream langfuse_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name langfuse.yourdomain.com;   # CHANGEME
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name langfuse.yourdomain.com;   # CHANGEME

    # certbot --nginx populates these two lines automatically:
    # ssl_certificate     /etc/letsencrypt/live/langfuse.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/langfuse.yourdomain.com/privkey.pem;

    # Trace/media payloads can be large; raise the upload ceiling.
    client_max_body_size 100m;

    # SSE / streaming responses (e.g. trace streaming, LLM playground) must not buffer.
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://langfuse_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket / upgrade support
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
