# nginx reverse proxy for langfuse-web — TLS termination on the host.
# Install to /etc/nginx/sites-available/langfuse and symlink into sites-enabled,
# or drop into /etc/nginx/conf.d/langfuse.conf.
#
# TLS: easiest path is certbot —
#   sudo certbot --nginx -d langfuse.yourdomain.com
# which fills in the ssl_certificate lines automatically.

upstream langfuse_web {
    server 127.0.0.1:3000;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name langfuse.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name langfuse.yourdomain.com;

    # ssl_certificate     /etc/letsencrypt/live/langfuse.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/langfuse.yourdomain.com/privkey.pem;

    # Traces/media payloads can be large; raise the upload ceiling.
    client_max_body_size 100m;

    # SSE / streaming responses must not be buffered.
    proxy_buffering off;
    proxy_read_timeout 300s;

    location / {
        proxy_pass http://langfuse_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
